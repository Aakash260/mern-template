version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
    - "27018:27017"    
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/mydb

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    
volumes:
  mongo-data: